<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<script>

    for (let i = 0; i < 5; i++) {
    let input = prompt("Enter a number:");
    let num = Number(input);

    if (num > 0) {
        alert(num + " is Positive");
    } else if (num < 0) {
        alert(num + " is Negative");
    } else {
        alert(num + " is Zero");
    }
}

</script>




</body>
</html>
