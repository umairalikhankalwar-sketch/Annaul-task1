<!DOCTYPE html>
<html>
<head>
    <title>Student Profile Card</title>
    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

.seprate{
    margin: 10px;
    background-color: yellow;
    padding: 15px;
}

        .card{
            width:320px;
            background:blue;
            padding:20px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 10px rgb(255, 26, 26);
        }
        img{
            
            width:150px;
            height:150px;
            border-radius: 10% 0 10% 0 ;
        }
        button{
            padding:10px 20px;         
            background:green;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }
        button:hover{
            background:darkgreen;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="seprate">
    <h2>Student Profile</h2>
    <img src="img.jpg.png">
    <h3>Umair Ali</h3>
    <p><b>Course:</b> Web Development</p>
    <p><b>City:</b> Karachi</p>
    <p>Hello! I am learning HTML, CSS & JavaScript.</p>
    <button>Contact Me</button>
    </div>
</div>

</body>
</html>
