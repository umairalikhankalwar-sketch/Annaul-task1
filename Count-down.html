<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Countdown Timer</title>
</head>
<body>

    <h2>Countdown (10 to 1)</h2>
    <button onclick="startCountdown()">Start Countdown</button>

    <script>
        function startCountdown() {
            let count = 10;

           
            while (count >= 1) {
                console.log(count);
                count--; 
            }

           
            console.log("Happy Coding!");
            alert("Countdown complete! Check the Console for details.");
        }
    </script>
</body>
</html>
